<!DOCTYPE html>

<html>

<head>


<title>Learn</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/learn.css') }}">


</head>

<body>

<div class="container">


<a href="/dashboard" class="back-btn">
    ⬅ Back To Dashboard
</a>

<h1>🛒 Shopping Lesson</h1>

{% for english, translation in words.items() %}

<div class="lesson-card">

    <div class="english">
        {{ english }}
    </div>

    <div class="translation">
        {{ translation }}
    </div>

</div>

{% endfor %}

<br>

<form action="/complete-lesson" method="POST">

    <button type="submit" class="complete-btn">
    ✅ Complete Lesson (+10 XP)
</button>
</form>

<br>

<a href="/shopping-quiz">
    <button type="button" class="take-quiz-btn">
        📝 Take Quiz
    </button>
</a>
</div>

</body>

</html>
