<!DOCTYPE html>

<html>

<head>
<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>

<div class="container">

<h1>🌍 Language Learning App</h1>

<h2>Login / లాగిన్</h2>

<form action="/login" method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

<p>
    New User?
    <a href="/register">
        Register
    </a>
</p>


</div>

</body>

</html>
